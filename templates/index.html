<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Quadge - Quadlet Manager</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
	<script src="https://unpkg.com/htmx.org@2.0.0"></script>
	<script src="https://unpkg.com/htmx-ext-sse@2.0.0/sse.js"></script>
	<style>
		:root {
			--sidebar-width: 220px;
		}
		body {
			margin: 0;
			padding: 0;
			min-height: 100vh;
		}
		.layout {
			display: flex;
			min-height: 100vh;
		}
		.sidebar {
			width: var(--sidebar-width);
			background: var(--card-background-color);
			border-right: 1px solid var(--muted-border-color);
			padding: 1rem;
			display: flex;
			flex-direction: column;
		}
		.sidebar h3 {
			margin-bottom: 0.5rem;
		}
		.service-list {
			flex: 1;
			overflow-y: auto;
		}
		.service-item {
			padding: 0.5rem;
			cursor: pointer;
			border-radius: var(--border-radius);
			margin-bottom: 0.25rem;
		}
		.service-item:hover {
			background: var(--primary-background);
		}
		.service-item.active {
			background: var(--primary);
			color: var(--primary-inverse);
		}
		.main {
			flex: 1;
			display: flex;
			flex-direction: column;
		}
		.main-header {
			padding: 1rem;
			border-bottom: 1px solid var(--muted-border-color);
			display: flex;
			align-items: center;
			gap: 1rem;
		}
		.main-content {
			flex: 1;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 1rem;
			padding: 1rem;
			overflow: hidden;
		}
		.panel {
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		.panel-header {
			font-weight: bold;
			margin-bottom: 0.5rem;
		}
		.panel-content {
			flex: 1;
			overflow: auto;
			background: var(--card-background-color);
			padding: 0.5rem;
			border-radius: var(--border-radius);
		}
		.status-running { color: green; }
		.status-stopped { color: var(--muted-color); }
		.status-failed { color: red; }
		pre {
			margin: 0;
			white-space: pre-wrap;
			font-size: 0.85rem;
		}
		.logs {
			font-family: monospace;
			font-size: 0.8rem;
			line-height: 1.3;
		}
		.btn-group {
			display: flex;
			gap: 0.5rem;
		}
		.btn-group button {
			padding: 0.25rem 0.75rem;
			font-size: 0.85rem;
		}
	</style>
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<h3>Quadge</h3>
			<a href="/new" role="button" class="outline" style="margin-bottom: 1rem;">+ New Service</a>
			<div class="service-list" id="service-list">
				{{template "service-list" .}}
			</div>
		</aside>
		<main class="main">
			<div id="main-content">
				{{template "main-content" .}}
			</div>
		</main>
	</div>
</body>
</html>
{{define "main-content"}}
{{if .Service}}
	{{template "service-detail" .}}
{{else}}
<div class="main-content" style="align-items: center; justify-content: center;">
	<p style="color: var(--muted-color);">Select a service or create a new one</p>
</div>
{{end}}
{{end}}
