<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Quadge - Quadlet Manager</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
	<script src="https://unpkg.com/htmx.org@2.0.0"></script>
	<script src="https://unpkg.com/htmx-ext-sse@2.0.0/sse.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/ini.min.js"></script>
	<style>
		:root {
			--sidebar-width: 220px;
		}
		body {
			margin: 0;
			padding: 0;
			min-height: 100vh;
		}
		.layout {
			display: flex;
			min-height: 100vh;
		}
		.sidebar {
			width: var(--sidebar-width);
			background: var(--card-background-color);
			border-right: 1px solid var(--muted-border-color);
			padding: 1rem;
			display: flex;
			flex-direction: column;
		}
		.sidebar h3 {
			margin-bottom: 0.5rem;
		}
		.service-list {
			flex: 1;
			overflow-y: auto;
		}
		.service-item {
			padding: 0.5rem;
			cursor: pointer;
			border-radius: var(--border-radius);
			margin-bottom: 0.25rem;
		}
		.service-item:hover {
			background: var(--primary-background);
		}
		.service-item.active {
			background: var(--primary);
			color: var(--primary-inverse);
		}
		.main {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}
		.main-header {
			padding: 1rem;
			border-bottom: 1px solid var(--muted-border-color);
			display: flex;
			align-items: center;
			gap: 1rem;
		}
		.main-content {
			flex: 1;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 1rem;
			padding: 1rem;
			overflow: hidden;
			min-height: 0;
		}
		.panel {
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		.panel-header {
			font-weight: bold;
			margin-bottom: 0.5rem;
		}
		.panel-content {
			flex: 1;
			overflow-y: auto;
			min-height: 0;
			background: var(--card-background-color);
			padding: 0.5rem;
			border-radius: var(--border-radius);
		}
		.status-running { color: green; }
		.status-stopped { color: var(--muted-color); }
		.status-failed { color: red; }
		.status-success { color: green; }
		.status-error { color: red; }
		pre {
			margin: 0;
			white-space: pre-wrap;
			font-size: 0.85rem;
		}
		.logs {
			font-family: monospace;
			font-size: 0.8rem;
			line-height: 1.4;
			background: #1a1a1a;
			padding: 0.75rem;
		}
		.log-line {
			margin: 0;
			padding: 0;
		}
		.log-error { color: #ff6b6b; font-weight: bold; }
		.log-warn { color: #ffa94d; }
		.log-info { color: #4dabf7; }
		.log-debug { color: #868e96; }
		.log-line.error { color: #ff6b6b; }
		.hljs {
			background: transparent !important;
			padding: 0 !important;
		}
		#main-content {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-height: 0;
		}
		.btn-group {
			display: flex;
			gap: 0.5rem;
		}
		.btn-group button {
			padding: 0.25rem 0.75rem;
			font-size: 0.85rem;
		}
	</style>
</head>
<body>
	<div class="layout">
		<aside class="sidebar">
			<h3>Quadge</h3>
			<button hx-get="/new" hx-target="#main-content" class="outline" style="margin-bottom: 1rem;">+ New Service</button>
			<div class="service-list" id="service-list">
				{{template "service-list" .}}
			</div>
		</aside>
		<main class="main">
			<div id="main-content">
				{{template "main-content" .}}
			</div>
		</main>
	</div>
	<script>
		document.body.addEventListener('htmx:afterSettle', function() {
			document.querySelectorAll('pre code:not(.hljs)').forEach((block) => {
				hljs.highlightElement(block);
			});
		});
		document.body.addEventListener('htmx:sseMessage', function(evt) {
			var el = evt.detail.elt;
			el.scrollTop = el.scrollHeight;
		});
	</script>
</body>
</html>
{{define "main-content"}}
{{if .Service}}
	{{template "service-detail" .}}
{{else}}
<div class="main-content" style="align-items: center; justify-content: center;">
	<p style="color: var(--muted-color);">Select a service or create a new one</p>
</div>
{{end}}
{{end}}
